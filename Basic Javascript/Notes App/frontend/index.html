<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Pixel Notes</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">
    <header>
      <div class="pixel-cat">ฅ^•ﻌ•^ฅ</div>
      <h1>Cozy Pixel Notes</h1>
      <p class="subtitle">tiny thoughts, soft colors, warm vibes</p>
    </header>

    <section class="notes-layout">
      <div class="note-editor">
        <h2>New Note</h2>
        <input type="text" placeholder="Note title..." />
        <textarea placeholder="Write something cozy..."></textarea>
        <button>Save Note ✦</button>
      </div>

      <div class="notes-list">
        <div class="note-card">
          <h2>Morning</h2>
          <p>Drink tea, open the window, and write one small idea.</p>
        </div>

        <div class="note-card">
          <h2>Game Ideas</h2>
          <p>A pixel frog runs a tiny café in the rain.</p>
        </div>

        <div class="note-card">
          <h2>Reminder</h2>
          <p>Save your JavaScript file before refreshing!</p>
        </div>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
